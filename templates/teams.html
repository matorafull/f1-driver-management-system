<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Management | Teams</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="bg-dark text-white">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-danger">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="/">
                <span class="text-danger">F1</span> Management
            </a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">Dashboard</a>
                <a class="nav-link" href="/drivers-page">Drivers</a>
                <a class="nav-link active" href="/teams-page">Teams</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-uppercase fw-black mb-4">Manage <span class="text-danger">Teams</span></h2>

        <div class="card bg-black text-white border-secondary mb-5 shadow">
            <div class="card-body">
                <h5 class="card-title text-danger mb-3">Register New Team</h5>
                <form action="/teams/add" method="post" class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label text-secondary small">Short Name</label>
                        <input type="text" name="name" class="form-control bg-dark text-white border-secondary" placeholder="e.g. Red Bull" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label text-secondary small">Full Official Name</label>
                        <input type="text" name="full_name" class="form-control bg-dark text-white border-secondary" placeholder="e.g. Oracle Red Bull Racing" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-secondary small">Base City</label>
                        <input type="text" name="base_location" class="form-control bg-dark text-white border-secondary" placeholder="e.g. Milton Keynes" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label text-secondary small">Engine Supplier</label>
                        <input type="text" name="engine_supplier" class="form-control bg-dark text-white border-secondary" placeholder="e.g. Honda RBPT" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label d-block">&nbsp;</label>
                        <button type="submit" class="btn btn-danger w-100 fw-bold" style="height: 38px;">ADD TEAM</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card bg-secondary text-white border-0 shadow">
            <div class="card-header border-danger">
                <h5 class="mb-0">Registered Teams</h5>
            </div>
            <div class="card-body">
                <table class="table table-dark table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Team</th>
                            <th>Full Name</th>
                            <th>Location</th>
                            <th>Engine</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for team in teams %}
                        <tr>
                            <td class="fw-bold text-danger">{{ team.name }}</td>
                            <td>{{ team.full_name }}</td>
                            <td>{{ team.base_location }}</td>
                            <td><span class="badge bg-dark border border-secondary">{{ team.engine_supplier }}</span></td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
