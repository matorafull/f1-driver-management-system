{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-4">
        <h3 class="mb-4 text-danger"><i class="fa fa-plus-circle me-2"></i>Новая команда</h3>
        <form method="POST" class="card p-4 shadow-sm">
            <div class="mb-3">
                <label class="form-label text-secondary">Название команды</label>
                <input type="text" name="name" class="form-control bg-dark text-white border-secondary" placeholder="например, Mercedes-AMG" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary">Штаб-квартира</label>
                <input type="text" name="city" class="form-control bg-dark text-white border-secondary" placeholder="Брэкли, Великобритания">
            </div>
            <div class="mb-3">
                <label class="form-label text-secondary">Потолок бюджета ($)</label>
                <input type="number" name="budget" class="form-control bg-dark text-white border-secondary" placeholder="135000000">
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold">Зарегистрировать</button>
        </form>
    </div>

    <div class="col-md-8">
        <h3 class="mb-4">Кубок конструкторов</h3>
        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table table-dark table-hover mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Команда</th>
                            <th>База</th>
                            <th>Лимит бюджета</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for t in teams %}
                        <tr>
                            <td class="fw-bold">{{ t.team_name }}</td>
                            <td>{{ t.base_city }}</td>
                            <td class="text-info">${{ "{:,.0f}".format(t.budget_cap) if t.budget_cap else '0' }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
