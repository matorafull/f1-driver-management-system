<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Driver Management | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>


<body class="bg-dark text-white">

    <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-danger">
        <div class="container">
            <a class="navbar-brand fw-bold text-uppercase" href="/"><span class="text-danger">F1</span> Management</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/">Главная</a>
                <a class="nav-link" href="/drivers-page">Пилоты</a>
                <a class="nav-link" href="/teams-page">Команды</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-uppercase fw-black mb-4">Dashboard <span class="badge bg-danger">Season 2025</span></h1>

        <div class="row">
            <div class="col-md-7">
                <div class="card bg-secondary text-white border-0 shadow">
                    <div class="card-header border-danger">
                        <h5 class="mb-0">Личный зачет (WDC)</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-dark table-hover" id="drivers-standings">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Пилот</th>
                                    <th>Команда</th>
                                    <th>Очки</th>
                                </tr>
                            </thead>
                            <tbody>
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card bg-secondary text-white border-0 shadow">
                    <div class="card-header border-danger">
                        <h5 class="mb-0">Кубок конструкторов (WCC)</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-dark table-hover" id="wcc-standings">
                            <thead>
                                <tr>
                                    <th>Команда</th>
                                    <th>Очки</th>
                                </tr>
                            </thead>
                            <tbody>
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/script.js"></script>
</body>
</html>
