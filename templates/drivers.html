{% extends 'base.html' %}
{% block content %}

<div class="row mb-4">
    <div class="col-md-8">
        <h2 class="fw-bold">Current Drivers</h2>
    </div>
    <div class="col-md-4">
        <form action="/" method="GET" class="d-flex">
            <input type="text" name="search" class="form-control me-2 bg-dark text-white border-secondary" placeholder="Search for driver...">
            <button type="submit" class="btn btn-danger">Search</button>
        </form>
    </div>
</div>

<div class="row g-4">
    {% for d in drivers %}
    <div class="col-md-4">
        <div class="card h-100 shadow-sm border-top border-danger border-4">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <h5 class="card-title mb-0 fw-bold">{{ d.full_name }}</h5>
                    <span class="badge bg-danger">#{{ d.driver_number }}</span>
                </div>
                <p class="text-secondary mb-3"><i class="fa fa-shield-halved me-1"></i>{{ d.team_name }}</p>

                <div class="d-flex justify-content-between align-items-center mt-auto">
                    <a href="{{ url_for('driver_stats', driver_id=d.driver_id) }}" class="btn btn-outline-light btn-sm ms-auto">Stats</a>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

{% endblock %}
